version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "all"
    ignore:
      # Pinned to match the peer range of @anthropic-ai/claude-agent-sdk;
      # newer minors break type compatibility between the two installed copies.
      - dependency-name: "@anthropic-ai/sdk"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      minor:
        update-types:
          - "minor"
          - "patch"
